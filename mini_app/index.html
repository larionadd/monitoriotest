<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monitorio</title>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Monitorio</h1>
        <p id="userLabel">Кабінет моніторингу</p>
      </div>
      <button class="icon-button" id="closeButton" type="button" aria-label="Закрити">×</button>
    </header>

    <section class="panel panel-country">
      <h2>
        <span class="section-icon icon-cyan">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20Zm6.9 9h-3.2a15.5 15.5 0 0 0-1.1-5A8.05 8.05 0 0 1 18.9 11ZM12 4.1A13.3 13.3 0 0 1 13.7 11h-3.4A13.3 13.3 0 0 1 12 4.1ZM4.1 13h3.2a15.5 15.5 0 0 0 1.1 5A8.05 8.05 0 0 1 4.1 13Zm3.2-2H4.1a8.05 8.05 0 0 1 4.3-5 15.5 15.5 0 0 0-1.1 5ZM12 19.9A13.3 13.3 0 0 1 10.3 13h3.4A13.3 13.3 0 0 1 12 19.9Zm2.6-1.9a15.5 15.5 0 0 0 1.1-5h3.2a8.05 8.05 0 0 1-4.3 5Z"/></svg>
        </span>
        Країна моніторингу
      </h2>
      <div class="segmented segmented-country">
        <button data-country="ua" type="button">Україна</button>
        <button data-country="pl" type="button">Polska</button>
        <button data-country="gb" type="button">United Kingdom</button>
      </div>
    </section>

    <section class="panel panel-keywords">
      <h2>
        <span class="section-icon icon-violet">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 7.5a4 4 0 1 1 1.2 2.85l-1.9 1.9 1.45 1.45-1.55 1.55-1.45-1.45-1.65 1.65 1.45 1.45-1.55 1.55-1.45-1.45-2.4 2.4H4v-3.65l6.15-6.15A4 4 0 0 1 15.5 7.5Zm0-2a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/></svg>
        </span>
        Ключові слова
      </h2>
      <div class="field-row">
        <input id="keywordInput" type="text" autocomplete="off" placeholder="Ключове слово або фраза">
        <button class="primary-action" id="addKeywordButton" type="button">Додати</button>
      </div>
      <div class="field-row">
        <input id="removeKeywordInput" type="text" autocomplete="off" placeholder="Ключ для видалення">
        <button class="secondary" id="removeKeywordButton" type="button">Видалити</button>
      </div>
    </section>

    <section class="panel panel-search">
      <h2>
        <span class="section-icon icon-pink">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.5 4a6.5 6.5 0 0 1 5.17 10.44l4.45 4.44-1.24 1.24-4.44-4.45A6.5 6.5 0 1 1 10.5 4Zm0 1.8a4.7 4.7 0 1 0 0 9.4 4.7 4.7 0 0 0 0-9.4Z"/></svg>
        </span>
        Режим пошуку
      </h2>
      <div class="segmented">
        <button class="mode-active" id="fulltextOnButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h8l4 4v14H6V3Zm7 1.8V8h3.2L13 4.8ZM8 11v1.6h8V11H8Zm0 3.2v1.6h8v-1.6H8Zm0 3.2V19h5v-1.6H8Z"/></svg>
          Повний текст
        </button>
        <button id="fulltextOffButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5.5A13.5 13.5 0 0 1 18.5 19H16A11 11 0 0 0 5 8V5.5Zm0 5A8.5 8.5 0 0 1 13.5 19H11A6 6 0 0 0 5 13v-2.5Zm0 5A3.5 3.5 0 0 1 8.5 19H5v-3.5Z"/></svg>
          RSS-анонс
        </button>
      </div>
    </section>

    <section class="panel panel-telegram">
      <h2>
        <span class="section-icon icon-cyan">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.7 4.4 18.5 20c-.24 1.07-.9 1.33-1.83.83l-5.05-3.72-2.44 2.35c-.27.27-.5.5-1.03.5l.36-5.13 9.34-8.44c.4-.36-.09-.56-.63-.2L5.68 13.45.7 11.9c-1.08-.34-1.1-1.08.23-1.6L20.4 2.8c.9-.33 1.68.2 1.3 1.6Z"/></svg>
        </span>
        TG-пакети
      </h2>
      <div class="blocks">
        <button data-block="1" data-enabled="false" type="button"><span class="mini-plane">⌁</span>Вимкнути 1-50</button>
        <button class="enabled" data-block="1" data-enabled="true" type="button"><span class="mini-plane">⌁</span>Увімкнути 1-50<span class="checkmark">✓</span></button>
        <button data-block="2" data-enabled="false" type="button"><span class="mini-plane">⌁</span>Вимкнути 51-100</button>
        <button class="enabled" data-block="2" data-enabled="true" type="button"><span class="mini-plane">⌁</span>Увімкнути 51-100<span class="checkmark">✓</span></button>
        <button data-block="3" data-enabled="false" type="button"><span class="mini-plane">⌁</span>Вимкнути 101-150</button>
        <button class="enabled" data-block="3" data-enabled="true" type="button"><span class="mini-plane">⌁</span>Увімкнути 101-150<span class="checkmark">✓</span></button>
        <button data-block="4" data-enabled="false" type="button"><span class="mini-plane">⌁</span>Вимкнути 151-200</button>
        <button class="enabled" data-block="4" data-enabled="true" type="button"><span class="mini-plane">⌁</span>Увімкнути 151-200<span class="checkmark">✓</span></button>
        <button data-block="5" data-enabled="false" type="button"><span class="mini-plane">⌁</span>Вимкнути 201-230</button>
        <button class="enabled" data-block="5" data-enabled="true" type="button"><span class="mini-plane">⌁</span>Увімкнути 201-230<span class="checkmark">✓</span></button>
      </div>
    </section>

    <section class="panel commands">
      <button class="command-row" id="sourcesFileButton" type="button">
        <span class="command-icon icon-violet">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 3h2v9.2l3.2-3.2 1.4 1.4-5.6 5.6-5.6-5.6L7.8 9l3.2 3.2V3Zm-6 14h2v2h10v-2h2v4H5v-4Z"/></svg>
        </span>
        <span><strong>Отримати файл джерел</strong><small>Завантажити актуальний список джерел</small></span>
        <span class="chevron">›</span>
      </button>
      <button class="command-row" id="checkButton" type="button">
        <span class="command-icon icon-cyan">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m13 2-8 12h6l-1 8 9-13h-6l0-7Z"/></svg>
        </span>
        <span><strong>Перевірити зараз</strong><small>Запустити перевірку вручну</small></span>
        <span class="chevron">›</span>
      </button>
      <button class="command-row" id="plansButton" type="button">
        <span class="command-icon icon-pink">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 4.2 4.7L21 8l-9 13L3 8l4.8-.3L12 3Zm0 3.1L9.1 9.3h5.8L12 6.1ZM6.8 9.8l3.9 5.7-1.9-5.7h-2Zm4.1 0L12 17l1.1-7.2h-2.2Zm4.3 0-1.9 5.7 3.9-5.7h-2Z"/></svg>
        </span>
        <span><strong>Тарифи</strong><small>Обрати підписку</small></span>
        <span class="chevron">›</span>
      </button>
    </section>

    <p class="status" id="statusText">Дія буде виконана ботом у чаті.</p>
  </main>
  <script src="./app.js"></script>
</body>
</html>
